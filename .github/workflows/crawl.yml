name: Cubot Knowledge Sync

on:
  schedule:
    - cron: '0 1 1,15 * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Create .env.local
        run: |
          echo "NEON_DATABASE_URL=${{ secrets.NEON_DATABASE_URL }}" >> .env.local
          echo "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" >> .env.local
          echo "PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }}" >> .env.local
          echo "PINECONE_DIMENSION=768" >> .env.local
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env.local
          echo "CRON_SECRET=${{ secrets.CRON_SECRET }}" >> .env.local
      - run: npm run setup-db
      - run: npm run crawl
